<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page not found</title>
    <style>
      :root {
        --primary: #114c8d;
        --primary-dark: #0b3a6e;
        --text: #0f172a;
        --muted: #64748b;
        --border: #e2e8f0;
        --bg: #f8fafc;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 620px;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 40px 32px;
        box-shadow: 0 30px 120px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 74px;
        height: 74px;
        border-radius: 22px;
        background: var(--primary);
        color: white;
        font-size: 24px;
        font-weight: 700;
      }

      h1 {
        margin: 20px 0 10px;
        font-size: clamp(28px, 4vw, 42px);
        line-height: 1.1;
      }

      p {
        margin: 0 auto;
        max-width: 480px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .actions {
        margin-top: 28px;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 16px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: 0.2s ease;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover {
        background: var(--primary-dark);
      }

      .btn-secondary {
        background: white;
        color: var(--text);
        border: 1px solid var(--border);
      }

      .btn-secondary:hover {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">404</div>
      <h1>Page not found</h1>
      <p>
        The page you are trying to open does not exist, has moved, or the URL is incorrect.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="/">Go to homepage</a>
        <a class="btn btn-secondary" href="javascript:history.back()">Go back</a>
      </div>
    </div>
  </body>
</html>
